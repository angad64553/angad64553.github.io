name: Deploy Portfolio to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /var/www/html

            # Clone only if repository is not already present
            if [ ! -d ".git" ]; then
              git clone git@github.com:angad64553/angad64553.github.io.git .
            fi

            # Ensure correct remote
            git remote set-url origin git@github.com:angad64553/angad64553.github.io.git

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Correct permissions
            sudo chown -R ubuntu:ubuntu /var/www/html

            echo "✅ Deployment completed successfully!"